name: CodeQL
# Deaktiviert: Dieses Repo enthält keinen Python- oder JavaScript-Code.
# CodeQL wird reaktiviert, sobald Produktcode hinzukommt.
# Manuell auslösbar via Actions-Tab für Ad-hoc-Scans.
on:
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL – inaktiv bis Produktcode vorhanden
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Kein Code zu scannen
        run: |
          echo "CodeQL ist für dieses Repo deaktiviert (keine Python/JS-Dateien)."
          echo "Reaktivieren, wenn Produktcode hinzukommt."
